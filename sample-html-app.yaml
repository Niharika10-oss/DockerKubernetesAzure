apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-html-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-html-app
  template:
    metadata:
      labels:
        app: sample-html-app
    spec:
      containers:
      - name: sample-html-app
        image: niharikaacr101199.azurecr.io/sample-html-app:v1
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: sample-html-app-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: sample-html-app
