trigger:
- main

pool:
  name: 'SelfHosted'

stages:
- stage: Build
  jobs:
  - job: Build
    steps:
    - task: Docker@2
      displayName: Build and Push to ACR
      inputs:
        containerRegistry: 'dockerhub-connection'
        repository: 'niharikakolarkar/sample-html-app'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: |
          v1

- stage: Deploy
  dependsOn: Build
  jobs:
  - job: Deploy
    steps:
    - task: Kubernetes@1
      displayName: Deploy to AKS
      inputs:
        connectionType: 'Azure Resource Manager'
        azureSubscriptionEndpoint: 'azure-subscription-connection'
        azureResourceGroup: 'MyResourceGroup'
        kubernetesCluster: 'MyAKSCluster101199'
        namespace: 'default'
        command: 'apply'
        useConfigurationFile: true
        configuration: 'sample-html-app.yaml'
